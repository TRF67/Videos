name: 24/7 YouTube Stream from Public URLs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *" # reinicia cada 5 horas para evitar límite de GitHub Actions

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Sanitize playlist URLs
        run: |
          # Limpiar playlist: eliminar espacios y caracteres no imprimibles
          sed -i 's/ //g' playlist.txt
          sed -i 's/[^[:print:]]//g' playlist.txt
          # Reemplazar caracteres problemáticos %C2%BA%C2%BA por _
          sed -i 's/%C2%BA%C2%BA/_/g' playlist.txt

          echo "Sanitized playlist:"
          cat playlist.txt

      - name: Test URLs accessibility
        run: |
          while read URL; do
            echo "Testing $URL"
            curl -I "$URL" | head -n 1
          done < playlist.txt

      - name: Start streaming
        run: |
          STREAM="rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_KEY }}"

          while true
          do
            echo "Shuffling playlist..."
            shuf playlist.txt > shuffled.txt

            while read URL
            do
              echo "Streaming $URL to YouTube..."
              ffmpeg -re -i "$URL" \
                -c:v libx264 \
                -preset veryfast \
                -b:v 2500k \
                -maxrate 2500k \
                -bufsize 5000k \
                -pix_fmt yuv420p \
                -c:a aac \
                -b:a 128k \
                -ar 44100 \
                -f flv "$STREAM" 2>&1 | tee ffmpeg.log

              echo "Finished streaming $URL, moving to next video."
            done < shuffled.txt
          done
